<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedEdr</title>
    <script src="/static/shared.js"></script>
    <link rel="stylesheet" href="/static/design.css">
</head>
<body>

    <header>
        <div class="container">
            <div class="item">
                <div><strong>RedEdr</strong></div>
                <div><a href="https://github.com/dobin/RedEdr" target="_blank">github.com/dobin/RedEdr</a></div>
            </div>
            <div class="item">
                <div>Target</div>
                <div><input type="text" id="trace" placeholder="otepad"></div>
                <div><button onclick="BtnApplyTrace()">Apply</button></div>
            </div>
            <div class="item" id="response">
                <div>Events: <span id="stats-counter">0</span></div>
                <div id="stat_kernel" style="display:none">Kernel: <span id="num_kernel">0</span></div>
                <div id="stat_etw" style="display:none">   ETW &nbsp;&nbsp;&nbsp;: <span id="num_etw">0</span></div>
                <div id="stat_etwti" style="display:none"> ETWTI &nbsp;: <span id="num_etwti">0</span></div>
                <div id="stat_dll" style="display:none">   DLL &nbsp;&nbsp;&nbsp;: <span id="num_dll">0</span></div>
            </div>
            <div class="item">
                <div>Options</div>
                <div><button onclick="BtnReset()">Clear Events</button></div>
            </div>

        </div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="showContent('tab1', this)">Events</div>
        <div class="tab" onclick="showContent('tab2', this)">Analyzer</div>
        <div class="tab" onclick="showContent('tab3', this)">Recordings</div>
    </div>

    <div class="content" id="content">
        <div id="tab1" class="tab-content">
            <div id="eventContainer"></div>
        </div>
        <div id="tab3" class="tab-content" style="display: none;">
            <div id="recordingsContainer"></div>
        </div>
    </div>

    <script>
        MyData = {
            "stats": {
                "events_count": 0,
            },
            "events": [],
        }

        function showContent(tabId, tabElement) {
            // Hide all tab contents
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.style.display = 'none');

            // Remove active class from all tabs
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => tab.classList.remove('active'));

            // Show the selected tab content
            document.getElementById(tabId).style.display = 'block';

            // Add active class to the clicked tab if tabElement is provided
            if (tabElement) {
                tabElement.classList.add('active');
            }
        }

        function showRecordings(data) {
            const container = document.getElementById('recordingsContainer');
            container.innerHTML = '';

            data.forEach(recording => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="recording">
                        <a href="/recordings?name=${recording}" target="_blank">${recording}</a> <br>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function fetchEvents() {
            const response = await fetch('/api/logs/rededr');
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            const data = await response.json();
            displayEvents(data);
        }

        async function fetchStats() {
            const response = await fetch('/api/stats');
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            const data = await response.json();

            // Check if we need to update something
            if (data.events_count > MyData.stats.events_count) {
                fetchEvents();

                // Store new stats
                MyData.stats = data;

                // Update UI
                document.getElementById('stats-counter').textContent = `${data.events_count}`;

                function setStat(statId, spanId, value) {
                    document.getElementById(spanId).textContent = value;
                    document.getElementById(statId).style.display = value > 0 ? 'block' : 'none';
                }
                setStat('stat_kernel', 'num_kernel', data.num_kernel);
                setStat('stat_etw', 'num_etw', data.num_etw);
                setStat('stat_etwti', 'num_etwti', data.num_etwti);
                setStat('stat_dll', 'num_dll', data.num_dll);
            }
        }

        async function fetchRecordings() {
            const response = await fetch('/api/recordings');
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            const data = await response.json();
            showRecordings(data);
        }

        async function sendSave() {
            const response = await fetch('/api/save');
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            const data = await response.json();
        }

        async function sendReset() {
            const response = await fetch('/api/trace/reset', {
                method: 'POST'
            });
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            const data = await response.json();
        }

        async function sendTrace(name) {
            const response = await fetch('/api/trace/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ "trace": name }),
            });
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
        }

        function BtnReset() {
            sendReset();
        }
        function BtnApplyTrace() {
            sendTrace(document.getElementById('trace').value);
        }
        function getTraceTarget() {
            fetch('/api/trace/info')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('trace').value = data.trace;
                });
        }

        showContent('tab1', null);  // show first tab
        fetchStats(); // initial fetch
        setInterval(fetchStats, 1 * 1000); // periodic check

        fetchRecordings();
        getTraceTarget();
    </script>

</body>
</html>
